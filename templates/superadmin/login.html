<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedAdmin — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a; --surface: #111827; --border: #1e2d47;
      --accent: #00c2ff; --text: #e2e8f0; --text-muted: #64748b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,194,255,0.06) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #00c2ff, #7c3aed);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin: 0 auto 12px;
    }
    .logo h1 { font-size: 22px; font-weight: 700; }
    .logo h1 span { color: var(--accent); }
    .logo p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-control:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0a0e1a;
      border: none;
      border-radius: 8px;
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #00d4ff; }
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <h1>RKP<span>Admin</span></h1>
      <p>Doctor Booking — Superadmin Panel</p>
    </div>
    {% if messages %}
      {% for message in messages %}
        <div class="alert-error">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="admin@example.com" value="{{ email|default:'' }}" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
  </div>
</body>
</html>
