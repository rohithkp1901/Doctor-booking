<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RKPBook — Doctor Booking Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface2: #f8faff;
      --border: #e2e8f8;
      --accent: #4f6ef7;
      --accent-light: #eef1fe;
      --accent2: #7c3aed;
      --success: #059669;
      --success-light: #ecfdf5;
      --warning: #d97706;
      --warning-light: #fffbeb;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      --shadow-lg: 0 8px 32px rgba(79,110,247,.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: 'Outfit', sans-serif; cursor: pointer; }

    /* ── NAV ── */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 0 var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 800; }
    .nav-brand .dot { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
    }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── AUTH ── */
    .auth-wrap {
      min-height: calc(100vh - 60px);
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .auth-header { margin-bottom: 28px; }
    .auth-header h2 { font-size: 24px; font-weight: 800; }
    .auth-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .auth-toggle { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .auth-toggle a { color: var(--accent); font-weight: 600; cursor: pointer; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text);
      background: var(--surface2); outline: none; transition: border-color .15s;
    }
    .form-control:focus { border-color: var(--accent); background: #fff; }
    .form-control::placeholder { color: var(--text-dim); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: 10px;
      font-size: 13.5px; font-weight: 600; border: none;
      transition: all .15s; cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3b5bdb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,110,247,.35); }
    .btn-primary:disabled { background: var(--text-dim); cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-success { background: var(--success-light); color: var(--success); border: 1px solid #a7f3d0; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

    /* ── MAIN LAYOUT ── */
    .app-layout { display: flex; min-height: calc(100vh - 60px); }
    .sidebar {
      width: 220px; min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 12px; border-radius: 10px;
      font-size: 13.5px; font-weight: 500; color: var(--text-muted);
      cursor: pointer; transition: all .15s; margin-bottom: 2px;
    }
    .sidebar-item:hover { background: var(--accent-light); color: var(--accent); }
    .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .sidebar-item .icon { font-size: 16px; }
    .sidebar-section { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); padding: 0 12px; margin: 16px 0 6px; }

    .app-content { flex: 1; padding: 28px 32px; overflow-y: auto; }

    /* ── SECTION HEADER ── */
    .section-header { margin-bottom: 24px; }
    .section-header h2 { font-size: 22px; font-weight: 800; }
    .section-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── DOCTOR CARDS ── */
    .doctors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .doctor-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: all .2s; cursor: pointer;
    }
    .doctor-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .doctor-avatar {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 12px;
    }
    .doctor-name { font-size: 15px; font-weight: 700; }
    .doctor-spec { font-size: 12px; color: var(--accent); font-weight: 600; margin: 3px 0; }
    .doctor-meta { display: flex; gap: 12px; margin-top: 10px; }
    .doctor-meta-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .doctor-fee { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .fee-amount { font-size: 16px; font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    .fee-label { font-size: 11px; color: var(--text-muted); }

    /* ── BOOKING FLOW ── */
    .booking-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 680px; }
    .booking-steps { display: flex; gap: 0; margin-bottom: 28px; }
    .step { flex: 1; text-align: center; position: relative; }
    .step::after { content: ''; position: absolute; top: 14px; left: 50%; right: -50%; height: 2px; background: var(--border); z-index: 0; }
    .step:last-child::after { display: none; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--border); color: var(--text-muted); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; position: relative; z-index: 1; transition: all .2s; }
    .step.done .step-num { background: var(--success); color: #fff; }
    .step.active .step-num { background: var(--accent); color: #fff; }
    .step-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .step.active .step-label { color: var(--accent); font-weight: 600; }

    /* Slots grid */
    .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 16px; }
    .slot-btn {
      padding: 10px 8px; border-radius: 10px; text-align: center;
      border: 1.5px solid var(--border); background: var(--surface2);
      font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all .15s;
    }
    .slot-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .slot-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
    .slot-btn:disabled { opacity: .4; cursor: not-allowed; text-decoration: line-through; }
    .slot-btn.booked { background: var(--danger-light); border-color: #fecaca; color: var(--danger); }

    /* ── APPOINTMENTS ── */
    .appt-list { display: flex; flex-direction: column; gap: 12px; }
    .appt-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .appt-date-block {
      background: var(--accent-light); border-radius: 10px;
      padding: 10px 14px; text-align: center; min-width: 64px;
    }
    .appt-date-day { font-size: 22px; font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    .appt-date-mon { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; }
    .appt-info { flex: 1; }
    .appt-doctor { font-size: 15px; font-weight: 700; }
    .appt-spec { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .appt-time { font-size: 13px; color: var(--text-dim); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
    .appt-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

    /* ── LEAVE ── */
    .leave-list { display: flex; flex-direction: column; gap: 12px; }
    .leave-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .leave-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .leave-dates { font-size: 13px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .leave-reason { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
    .leave-admin-note { font-size: 12px; color: var(--text-muted); margin-top: 8px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--border); }

    /* ── BADGE ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-pending { background: var(--warning-light); color: var(--warning); }
    .badge-confirmed, .badge-approved, .badge-active { background: var(--success-light); color: var(--success); }
    .badge-rejected, .badge-cancelled { background: var(--danger-light); color: var(--danger); }
    .badge-completed { background: #ede9fe; color: var(--accent2); }

    /* ── ALERTS ── */
    .alert { padding: 12px 16px; border-radius: 10px; font-size: 13.5px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .alert-error { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; }
    .alert-success { background: var(--success-light); color: var(--success); border: 1px solid #a7f3d0; }
    .alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid #c7d2fe; }

    /* ── MISC ── */
    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: flex; align-items: center; justify-content: center; padding: 48px; gap: 12px; color: var(--text-muted); font-size: 14px; }
    .loading .spin { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 24px 64px rgba(0,0,0,.15); }
    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }

    .success-animation { text-align: center; padding: 20px; }
    .success-animation .checkmark { font-size: 56px; margin-bottom: 12px; animation: pop .4s cubic-bezier(.17,.67,.35,1.5); }
    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .app-content { padding: 16px; }
      .doctors-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">🏥 RKP<span class="dot">Book</span></div>
  <div class="nav-right" id="navRight">
    <button class="btn btn-outline btn-sm" onclick="showPage('login')">Sign In</button>
    <button class="btn btn-primary btn-sm" onclick="showPage('register')">Sign Up</button>
  </div>
</nav>

<!-- ════════════════════ AUTH PAGES ════════════════════ -->
<div id="page-login" class="page active">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome back</h2>
        <p>Sign in to your MedBook account</p>
      </div>
      <div id="loginAlert"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()" id="loginBtn">Sign In</button>
      <div class="auth-toggle">Don't have an account? <a onclick="showPage('register')">Sign up</a></div>
    </div>
  </div>
</div>

<div id="page-register" class="page">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Create account</h2>
        <p>Book doctors, manage appointments</p>
      </div>
      <div id="registerAlert"></div>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="regFirst" class="form-control" placeholder="John">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="regLast" class="form-control" placeholder="Doe">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" class="form-control" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" class="form-control" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" class="form-control" placeholder="Repeat password">
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()" id="registerBtn">Create Account</button>
      <div class="auth-toggle">Already have an account? <a onclick="showPage('login')">Sign in</a></div>
    </div>
  </div>
</div>

<!-- ════════════════════ APP PAGES ════════════════════ -->
<div id="page-app" class="page">
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="appSidebar">
      <!-- filled by JS based on role -->
    </aside>

    <!-- Content area -->
    <main class="app-content" id="appContent">
      <!-- dynamic sections -->
      <div id="section-doctors" class="section"></div>
      <div id="section-book" class="section" style="display:none"></div>
      <div id="section-my-appointments" class="section" style="display:none"></div>
      <div id="section-doctor-appointments" class="section" style="display:none"></div>
      <div id="section-leaves" class="section" style="display:none"></div>
    </main>
  </div>
</div>

<!-- ════════════════════ BOOKING MODAL ════════════════════ -->
<div class="modal-overlay" id="bookingModal">
  <div class="modal">
    <div id="bookingModalContent"></div>
  </div>
</div>

<script>
const API = '';  // same origin; set to http://127.0.0.1:8000 if serving separately

let state = {
  token: localStorage.getItem('access_token') || null,
  refresh: localStorage.getItem('refresh_token') || null,
  user: JSON.parse(localStorage.getItem('user') || 'null'),
  currentSection: 'doctors',
};

// ── Helpers ──────────────────────────────────────────────────────────────────

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
}

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.getElementById(`section-${name}`).style.display = 'block';
  state.currentSection = name;
  document.querySelectorAll('.sidebar-item').forEach(i => {
    i.classList.toggle('active', i.dataset.section === name);
  });
}

function showAlert(containerId, msg, type = 'error') {
  document.getElementById(containerId).innerHTML =
    `<div class="alert alert-${type}"><span>${type==='error'?'⚠️':'✅'}</span> ${msg}</div>`;
}

function clearAlert(id) { document.getElementById(id).innerHTML = ''; }

async function apiFetch(path, opts = {}) {
  if (state.token) {
    opts.headers = { ...opts.headers, Authorization: `Bearer ${state.token}` };
  }
  if (opts.body && typeof opts.body === 'object') {
    opts.headers = { ...opts.headers, 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(opts.body);
  }
  let res = await fetch(API + path, opts);
  if (res.status === 401 && state.refresh) {
    // Try token refresh
    const r = await fetch(API + '/api/auth/token/refresh/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh: state.refresh }),
    });
    if (r.ok) {
      const d = await r.json();
      state.token = d.access;
      localStorage.setItem('access_token', d.access);
      opts.headers['Authorization'] = `Bearer ${state.token}`;
      res = await fetch(API + path, opts);
    } else {
      doLogout();
      return null;
    }
  }
  return res;
}

// ── Auth ─────────────────────────────────────────────────────────────────────

async function doLogin() {
  clearAlert('loginAlert');
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.disabled = true;

  const res = await fetch(API + '/api/auth/login/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value,
    }),
  });
  const data = await res.json();
  btn.innerHTML = 'Sign In'; btn.disabled = false;

  if (data.success) {
    state.token = data.data.access;
    state.refresh = data.data.refresh;
    state.user = data.data.user;
    localStorage.setItem('access_token', state.token);
    localStorage.setItem('refresh_token', state.refresh);
    localStorage.setItem('user', JSON.stringify(state.user));
    initApp();
  } else {
    showAlert('loginAlert', data.message || 'Login failed.');
  }
}

async function doRegister() {
  clearAlert('registerAlert');
  const btn = document.getElementById('registerBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  const res = await fetch(API + '/api/auth/register/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      first_name: document.getElementById('regFirst').value,
      last_name: document.getElementById('regLast').value,
      email: document.getElementById('regEmail').value,
      password: document.getElementById('regPassword').value,
      confirm_password: document.getElementById('regConfirm').value,
    }),
  });
  const data = await res.json();
  btn.innerHTML = 'Create Account'; btn.disabled = false;

  if (data.success) {
    state.token = data.data.tokens.access;
    state.refresh = data.data.tokens.refresh;
    state.user = data.data.user;
    localStorage.setItem('access_token', state.token);
    localStorage.setItem('refresh_token', state.refresh);
    localStorage.setItem('user', JSON.stringify(state.user));
    initApp();
  } else {
    const errs = data.errors ? Object.values(data.errors).flat().join(' ') : data.message;
    showAlert('registerAlert', errs);
  }
}

function doLogout() {
  if (state.refresh) {
    fetch(API + '/api/auth/logout/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
      body: JSON.stringify({ refresh: state.refresh }),
    }).catch(() => {});
  }
  state.token = state.refresh = state.user = null;
  localStorage.clear();
  updateNav();
  showPage('login');
}

function updateNav() {
  const navRight = document.getElementById('navRight');
  if (state.user) {
    const initials = (state.user.first_name?.[0] || '') + (state.user.last_name?.[0] || '');
    navRight.innerHTML = `
      <div class="nav-user">
        <div class="nav-avatar">${initials.toUpperCase()}</div>
        <span>${state.user.first_name}</span>
        <span style="color:var(--text-dim);font-size:11px">(${state.user.role})</span>
      </div>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">Sign Out</button>
    `;
  } else {
    navRight.innerHTML = `
      <button class="btn btn-outline btn-sm" onclick="showPage('login')">Sign In</button>
      <button class="btn btn-primary btn-sm" onclick="showPage('register')">Sign Up</button>
    `;
  }
}

// ── App Init ─────────────────────────────────────────────────────────────────

function initApp() {
  updateNav();
  showPage('app');
  buildSidebar();
  if (state.user.role === 'customer') {
    renderDoctors();
    showSection('doctors');
  } else if (state.user.role === 'doctor') {
    renderDoctorAppointments();
    showSection('doctor-appointments');
  }
}

function buildSidebar() {
  const sb = document.getElementById('appSidebar');
  const role = state.user.role;
  let html = '';

  if (role === 'customer') {
    html = `
      <div class="sidebar-section">Discover</div>
      <div class="sidebar-item active" data-section="doctors" onclick="showSection('doctors');renderDoctors()">
        <span class="icon">🔍</span> Find Doctors
      </div>
      <div class="sidebar-section">My Activity</div>
      <div class="sidebar-item" data-section="my-appointments" onclick="showSection('my-appointments');renderMyAppointments()">
        <span class="icon">📅</span> My Appointments
      </div>
    `;
  } else if (role === 'doctor') {
    html = `
      <div class="sidebar-section">Practice</div>
      <div class="sidebar-item active" data-section="doctor-appointments" onclick="showSection('doctor-appointments');renderDoctorAppointments()">
        <span class="icon">📅</span> Appointments
      </div>
      <div class="sidebar-section">Time Off</div>
      <div class="sidebar-item" data-section="leaves" onclick="showSection('leaves');renderLeaves()">
        <span class="icon">🏖️</span> Leave Requests
      </div>
    `;
  }

  sb.innerHTML = html;
}

// ── Doctors List ─────────────────────────────────────────────────────────────

async function renderDoctors() {
  const el = document.getElementById('section-doctors');
  el.innerHTML = `<div class="section-header"><h2>Find a Doctor</h2><p>Browse our specialists and book an appointment</p></div><div class="loading"><div class="spin"></div> Loading doctors...</div>`;

  const res = await apiFetch('/api/doctors/');
  if (!res) return;
  const data = await res.json();
  const doctors = data.data || [];

  if (!doctors.length) {
    el.innerHTML += `<div class="empty-state"><div class="icon">👨‍⚕️</div><p>No doctors available yet.</p></div>`;
    return;
  }

  const grid = doctors.map(d => `
    <div class="doctor-card" onclick="openBooking(${d.id})">
      <div class="doctor-avatar">👨‍⚕️</div>
      <div class="doctor-name">${d.full_name}</div>
      <div class="doctor-spec">${d.specialization}</div>
      <div class="doctor-meta">
        <div class="doctor-meta-item">🎓 ${d.qualification}</div>
        <div class="doctor-meta-item">⏱ ${d.experience_years} yrs</div>
      </div>
      ${d.bio ? `<div style="font-size:12px;color:var(--text-muted);margin-top:10px;line-height:1.5">${d.bio.slice(0,90)}${d.bio.length>90?'…':''}</div>` : ''}
      <div class="doctor-fee">
        <div>
          <div class="fee-amount">₹${parseFloat(d.consultation_fee).toLocaleString('en-IN')}</div>
          <div class="fee-label">Consultation fee</div>
        </div>
        <button class="btn btn-primary btn-sm">Book Now →</button>
      </div>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="section-header"><h2>Find a Doctor</h2><p>${doctors.length} specialist${doctors.length !== 1 ? 's' : ''} available</p></div>
    <div class="doctors-grid">${grid}</div>
  `;
}

// ── Booking Flow ─────────────────────────────────────────────────────────────

let bookingState = { doctorId: null, doctorName: '', date: null, slot: null };

async function openBooking(doctorId) {
  if (!state.user || state.user.role !== 'customer') {
    showPage('login'); return;
  }
  const res = await apiFetch(`/api/doctors/${doctorId}/`);
  if (!res) return;
  const d = (await res.json()).data;
  bookingState = { doctorId, doctorName: d.full_name, specialization: d.specialization, date: null, slot: null };

  renderBookingStep1();
  document.getElementById('bookingModal').classList.add('open');
}

function renderBookingStep1() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('bookingModalContent').innerHTML = `
    <h3>Book Appointment</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
      ${bookingState.doctorName} &mdash; ${bookingState.specialization}
    </p>
    <div class="booking-steps">
      <div class="step active"><div class="step-num">1</div><div class="step-label">Date</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-label">Slot</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-label">Confirm</div></div>
    </div>
    <div class="form-group">
      <label>Select Date</label>
      <input type="date" id="bookDate" class="form-control" min="${today}" value="${today}">
    </div>
    <div id="bookingAlert"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="loadSlots()">View Available Slots →</button>
      <button class="btn btn-outline" onclick="closeBookingModal()">Cancel</button>
    </div>
  `;
}

async function loadSlots() {
  const dateVal = document.getElementById('bookDate').value;
  if (!dateVal) { showAlert('bookingAlert', 'Please select a date.'); return; }
  bookingState.date = dateVal;

  document.getElementById('bookingModalContent').innerHTML = `
    <h3>Book Appointment</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
      ${bookingState.doctorName} &mdash; ${new Date(dateVal+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}
    </p>
    <div class="booking-steps">
      <div class="step done"><div class="step-num">✓</div><div class="step-label">Date</div></div>
      <div class="step active"><div class="step-num">2</div><div class="step-label">Slot</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-label">Confirm</div></div>
    </div>
    <div class="loading"><div class="spin"></div> Loading slots...</div>
  `;

  const res = await apiFetch(`/api/doctors/${bookingState.doctorId}/slots/?date=${dateVal}`);
  if (!res) return;
  const data = await res.json();

  if (!data.success) {
    document.getElementById('bookingModalContent').innerHTML += `<div class="alert alert-error">⚠️ ${data.message}</div>`;
    return;
  }

  const slots = data.data.slots;
  if (!slots.length) {
    renderNoSlots(dateVal);
    return;
  }

  const slotsHtml = slots.map(s => `
    <button class="slot-btn ${s.is_booked?'booked':''}"
      ${(!s.is_available)?'disabled':''} 
      onclick="selectSlot('${s.start_time}', '${s.end_time}', this)"
      title="${s.is_booked?'Already booked':s.is_past?'Past slot':'Available'}">
      ${s.start_time}
    </button>
  `).join('');

  document.getElementById('bookingModalContent').innerHTML = `
    <h3>Book Appointment</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
      ${bookingState.doctorName} &mdash; ${new Date(dateVal+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}
    </p>
    <div class="booking-steps">
      <div class="step done"><div class="step-num">✓</div><div class="step-label">Date</div></div>
      <div class="step active"><div class="step-num">2</div><div class="step-label">Slot</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-label">Confirm</div></div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">
      ${data.data.available_count} slots available
    </div>
    <div class="slots-grid">${slotsHtml}</div>
    <div id="bookingAlert" style="margin-top:12px"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-outline" onclick="renderBookingStep1()">← Change Date</button>
      <button class="btn btn-outline" onclick="closeBookingModal()">Cancel</button>
    </div>
  `;
}

function renderNoSlots(dateVal) {
  document.getElementById('bookingModalContent').innerHTML = `
    <h3>No Slots Available</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
      ${bookingState.doctorName} has no available slots on ${new Date(dateVal+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}.
    </p>
    <div class="empty-state" style="padding:20px"><div class="icon">😔</div><p>Try a different date.</p></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="renderBookingStep1()">← Choose Another Date</button>
      <button class="btn btn-outline" onclick="closeBookingModal()">Cancel</button>
    </div>
  `;
}

function selectSlot(startTime, endTime, btn) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  bookingState.slot = { start: startTime, end: endTime };

  // Show confirm step
  document.getElementById('bookingModalContent').innerHTML = `
    <h3>Confirm Appointment</h3>
    <div class="booking-steps">
      <div class="step done"><div class="step-num">✓</div><div class="step-label">Date</div></div>
      <div class="step done"><div class="step-num">✓</div><div class="step-label">Slot</div></div>
      <div class="step active"><div class="step-num">3</div><div class="step-label">Confirm</div></div>
    </div>
    <div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:18px;margin:16px 0">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;color:var(--text-muted);font-weight:600">DOCTOR</span>
        <span style="font-size:13px;font-weight:600">${bookingState.doctorName}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;color:var(--text-muted);font-weight:600">DATE</span>
        <span style="font-size:13px;font-family:'JetBrains Mono',monospace">${bookingState.date}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:12px;color:var(--text-muted);font-weight:600">TIME</span>
        <span style="font-size:13px;font-family:'JetBrains Mono',monospace">${startTime} – ${endTime}</span>
      </div>
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea id="bookNotes" class="form-control" rows="2" placeholder="Any symptoms or concerns..."></textarea>
    </div>
    <div id="bookingAlert"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="confirmBooking()" id="confirmBtn">Confirm Booking</button>
      <button class="btn btn-outline" onclick="loadSlots()">← Change Slot</button>
    </div>
  `;
}

async function confirmBooking() {
  const btn = document.getElementById('confirmBtn');
  btn.innerHTML = '<span class="spinner"></span> Booking...';
  btn.disabled = true;

  const res = await apiFetch('/api/appointments/book/', {
    method: 'POST',
    body: {
      doctor_id: bookingState.doctorId,
      appointment_date: bookingState.date,
      start_time: bookingState.slot.start,
      notes: document.getElementById('bookNotes')?.value || '',
    },
  });
  if (!res) return;
  const data = await res.json();

  if (data.success) {
    document.getElementById('bookingModalContent').innerHTML = `
      <div class="success-animation">
        <div class="checkmark">🎉</div>
        <h3 style="font-size:20px;font-weight:800;margin-bottom:8px">Appointment Confirmed!</h3>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
          Your appointment with ${bookingState.doctorName} on ${bookingState.date} at ${bookingState.slot.start} is booked.
        </p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn btn-primary" onclick="closeBookingModal();showSection('my-appointments');renderMyAppointments()">View My Appointments</button>
          <button class="btn btn-outline" onclick="closeBookingModal()">Done</button>
        </div>
      </div>
    `;
  } else {
    btn.innerHTML = 'Confirm Booking'; btn.disabled = false;
    const msg = data.message || (data.errors ? Object.values(data.errors).flat().join(' ') : 'Booking failed.');
    showAlert('bookingAlert', msg);
  }
}

function closeBookingModal() {
  document.getElementById('bookingModal').classList.remove('open');
}

// ── My Appointments (Customer) ───────────────────────────────────────────────

async function renderMyAppointments() {
  const el = document.getElementById('section-my-appointments');
  el.innerHTML = `<div class="section-header"><h2>My Appointments</h2><p>Your upcoming and past bookings</p></div><div class="loading"><div class="spin"></div></div>`;

  const res = await apiFetch('/api/appointments/my/');
  if (!res) return;
  const data = await res.json();
  const appts = data.data || [];

  if (!appts.length) {
    el.innerHTML = `
      <div class="section-header"><h2>My Appointments</h2><p>Your upcoming and past bookings</p></div>
      <div class="empty-state"><div class="icon">📅</div><p>No appointments yet. <a style="color:var(--accent);cursor:pointer" onclick="showSection('doctors');renderDoctors()">Find a doctor →</a></p></div>
    `;
    return;
  }

  const cards = appts.map(a => {
    const d = new Date(a.appointment_date + 'T00:00:00');
    const day = d.getDate().toString().padStart(2,'0');
    const mon = d.toLocaleString('en',{month:'short'}).toUpperCase();
    const canCancel = a.status === 'confirmed' || a.status === 'pending';
    return `
      <div class="appt-card">
        <div class="appt-date-block">
          <div class="appt-date-day">${day}</div>
          <div class="appt-date-mon">${mon}</div>
        </div>
        <div class="appt-info">
          <div class="appt-doctor">${a.doctor_name}</div>
          <div class="appt-spec">${a.doctor_specialization}</div>
          <div class="appt-time">${a.start_time} – ${a.end_time}</div>
        </div>
        <div class="appt-actions">
          <span class="badge badge-${a.status}">${a.status_display}</span>
          ${canCancel ? `<button class="btn btn-danger btn-sm" onclick="cancelAppointment(${a.id})">Cancel</button>` : ''}
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="section-header"><h2>My Appointments</h2><p>${appts.length} booking${appts.length!==1?'s':''} total</p></div>
    <div class="appt-list">${cards}</div>
  `;
}

async function cancelAppointment(id) {
  if (!confirm('Cancel this appointment?')) return;
  const res = await apiFetch(`/api/appointments/my/${id}/`, { method: 'PATCH' });
  if (!res) return;
  const data = await res.json();
  if (data.success) renderMyAppointments();
  else alert(data.message || 'Failed to cancel.');
}

// ── Doctor Appointments ──────────────────────────────────────────────────────

async function renderDoctorAppointments() {
  const el = document.getElementById('section-doctor-appointments');
  el.innerHTML = `<div class="section-header"><h2>My Appointments</h2><p>Patients scheduled with you</p></div><div class="loading"><div class="spin"></div></div>`;

  const res = await apiFetch('/api/appointments/doctor/');
  if (!res) return;
  const data = await res.json();
  const appts = data.data || [];

  if (!appts.length) {
    el.innerHTML = `<div class="section-header"><h2>My Appointments</h2><p>Patients scheduled with you</p></div><div class="empty-state"><div class="icon">📅</div><p>No appointments scheduled yet.</p></div>`;
    return;
  }

  const cards = appts.map(a => {
    const d = new Date(a.appointment_date + 'T00:00:00');
    const day = d.getDate().toString().padStart(2,'0');
    const mon = d.toLocaleString('en',{month:'short'}).toUpperCase();
    return `
      <div class="appt-card">
        <div class="appt-date-block">
          <div class="appt-date-day">${day}</div>
          <div class="appt-date-mon">${mon}</div>
        </div>
        <div class="appt-info">
          <div class="appt-doctor">${a.customer_name}</div>
          <div class="appt-spec" style="color:var(--text-muted)">${a.customer_email}</div>
          <div class="appt-time">${a.start_time} – ${a.end_time}</div>
          ${a.notes ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">📝 ${a.notes}</div>` : ''}
        </div>
        <div class="appt-actions">
          <span class="badge badge-${a.status}">${a.status_display}</span>
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = `<div class="section-header"><h2>My Appointments</h2><p>${appts.length} patient${appts.length!==1?'s':''} scheduled</p></div><div class="appt-list">${cards}</div>`;
}

// ── Leaves (Doctor) ──────────────────────────────────────────────────────────

async function renderLeaves() {
  const el = document.getElementById('section-leaves');
  el.innerHTML = `
    <div class="section-header">
      <h2>Leave Requests</h2>
      <p>Manage your time-off requests</p>
    </div>
    <div style="margin-bottom:20px">
      <button class="btn btn-primary" onclick="showLeaveForm()">+ Request Leave</button>
    </div>
    <div id="leaveFormArea"></div>
    <div id="leaveListArea"><div class="loading"><div class="spin"></div></div></div>
  `;
  loadLeaveList();
}

async function loadLeaveList() {
  const el = document.getElementById('leaveListArea');
  const res = await apiFetch('/api/leaves/');
  if (!res) return;
  const data = await res.json();
  const leaves = data.data || [];

  if (!leaves.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🏖️</div><p>No leave requests yet.</p></div>`;
    return;
  }

  const cards = leaves.map(l => `
    <div class="leave-card">
      <div class="leave-header">
        <span class="badge badge-${l.status}">${l.status_display}</span>
        ${l.status === 'pending' ? `<button class="btn btn-danger btn-sm" onclick="cancelLeave(${l.id})">Cancel</button>` : ''}
      </div>
      <div class="leave-dates">${l.start_date} → ${l.end_date}</div>
      <div class="leave-reason">${l.reason}</div>
      ${l.admin_reason ? `<div class="leave-admin-note">Admin note: ${l.admin_reason}</div>` : ''}
    </div>
  `).join('');

  el.innerHTML = `<div class="leave-list">${cards}</div>`;
}

function showLeaveForm() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('leaveFormArea').innerHTML = `
    <div class="booking-card" style="margin-bottom:20px">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">New Leave Request</h3>
      <div id="leaveFormAlert"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="leaveStart" class="form-control" min="${today}">
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="date" id="leaveEnd" class="form-control" min="${today}">
        </div>
      </div>
      <div class="form-group">
        <label>Reason</label>
        <textarea id="leaveReason" class="form-control" rows="3" placeholder="Reason for leave..."></textarea>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="submitLeave()" id="leaveSubmitBtn">Submit Request</button>
        <button class="btn btn-outline" onclick="document.getElementById('leaveFormArea').innerHTML=''">Cancel</button>
      </div>
    </div>
  `;
}

async function submitLeave() {
  const btn = document.getElementById('leaveSubmitBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  const res = await apiFetch('/api/leaves/', {
    method: 'POST',
    body: {
      start_date: document.getElementById('leaveStart').value,
      end_date: document.getElementById('leaveEnd').value,
      reason: document.getElementById('leaveReason').value,
    },
  });
  if (!res) return;
  const data = await res.json();
  btn.innerHTML = 'Submit Request'; btn.disabled = false;

  if (data.success) {
    document.getElementById('leaveFormArea').innerHTML = '';
    loadLeaveList();
  } else {
    const errs = data.errors ? Object.values(data.errors).flat().join(' ') : data.message;
    showAlert('leaveFormAlert', errs);
  }
}

async function cancelLeave(id) {
  if (!confirm('Cancel this leave request?')) return;
  const res = await apiFetch(`/api/leaves/${id}/`, { method: 'DELETE' });
  if (!res) return;
  const data = await res.json();
  if (data.success) loadLeaveList();
}

// ── Modal close on backdrop click ───────────────────────────────────────────
document.getElementById('bookingModal').addEventListener('click', function(e) {
  if (e.target === this) closeBookingModal();
});

// ── Bootstrap ────────────────────────────────────────────────────────────────
if (state.token && state.user) {
  initApp();
} else {
  updateNav();
  showPage('login');
}
</script>
</body>
</html>
